<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>虎尾科大 資訊追蹤系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700;800&family=Noto+Serif+TC:wght@700&family=Courier+Prime:wght@700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:linear-gradient(160deg,#080C12 0%,#0D1117 50%,#0A0E14 100%);min-height:100vh;color:#F0F0F0;font-family:'Noto Sans TC',sans-serif}
  ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#0D1117}::-webkit-scrollbar-thumb{background:#2A2A3A;border-radius:3px}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  /* Header */
  #header{background:rgba(0,0,0,.65);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.06);padding:16px 24px;position:sticky;top:0;z-index:100}
  .hi{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
  .logo{width:44px;height:44px;background:linear-gradient(135deg,#00D4AA,#7B61FF);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#fff;font-family:'Noto Serif TC',serif;flex-shrink:0}
  .t1{font-size:20px;font-weight:800;background:linear-gradient(135deg,#00D4AA,#7B61FF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-family:'Noto Serif TC',serif}
  .t2{font-size:11px;color:#555;margin-top:2px}
  #clock{font-size:20px;font-weight:800;color:#00D4AA;font-family:'Courier Prime',monospace;text-align:right}
  #datestr{font-size:11px;color:#555;text-align:right;margin-top:2px}
  #ub{background:rgba(255,107,53,.15);border:1px solid rgba(255,107,53,.4);border-radius:10px;padding:6px 14px;font-size:13px;color:#FF6B35;font-weight:700;animation:pulse 2s ease infinite;display:none}
  /* Main */
  #main{max-width:1100px;margin:0 auto;padding:24px}
  /* 學年度說明 */
  #ay-info{background:rgba(0,212,170,.05);border:1px solid rgba(0,212,170,.15);border-radius:12px;padding:12px 16px;margin-bottom:20px;font-size:12px;color:#777;line-height:1.8}
  #ay-info strong{color:#00D4AA}
  /* Stats */
  #stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:28px}
  .sc{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:14px 16px;cursor:pointer;transition:all .2s}
  .sc:hover{background:rgba(255,255,255,.05)}
  /* Toolbar */
  #toolbar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
  .sw{flex:1;min-width:200px;position:relative}
  #search{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:#F0F0F0;border-radius:12px;padding:10px 14px 10px 38px;font-size:14px;font-family:'Noto Sans TC',sans-serif}
  .si{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#555;pointer-events:none}
  #ss{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:#aaa;border-radius:12px;padding:10px 14px;font-size:13px;font-family:'Noto Sans TC',sans-serif;cursor:pointer}
  #ab{border-radius:12px;padding:10px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all .2s}
  /* Cards */
  .ec{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:20px;margin-bottom:16px;animation:fadeIn .4s ease forwards;position:relative;overflow:hidden;transition:background .2s}
  .ec:hover{background:rgba(255,255,255,.055)}
  .ec.urgent{border-color:rgba(255,107,53,.45)!important}
  .uf{position:absolute;top:0;right:0;background:linear-gradient(135deg,#FF6B35,#FF4D4D);color:#fff;font-size:10px;font-weight:800;padding:4px 14px 4px 20px;clip-path:polygon(20px 0,100% 0,100% 100%,0 100%);letter-spacing:1px}
  .sbadge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
  .countdown{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .cu{display:flex;flex-direction:column;align-items:center;border-radius:8px;padding:4px 8px;min-width:42px}
  .cv{font-size:18px;font-weight:800;line-height:1;font-family:'Courier Prime',monospace}
  .cl{font-size:10px;color:#888}
  .cx{color:#FF4444;font-size:14px;font-weight:700}
  .tb{background:rgba(0,0,0,.3);border-radius:12px;padding:12px 16px}
  .tl{font-size:11px;color:#666;margin-bottom:6px}
  .td{font-size:11px;color:#777;margin-top:6px}
  #empty{text-align:center;color:#555;padding:60px 0;font-size:16px;display:none}
  #footer{text-align:center;padding:28px 0 12px;color:#444;font-size:12px;line-height:1.8}
  input:focus,select:focus{outline:none}
</style>
</head>
<body>

<div id="header">
  <div class="hi">
    <div style="display:flex;align-items:center;gap:12px">
      <div class="logo">虎</div>
      <div>
        <div class="t1">虎尾科大 資訊追蹤系統</div>
        <div class="t2">進修部 · 進修教務組 · 語言教學中心 · 國際處</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">
      <div id="ub">⚠ <span id="uc">0</span> 項即將截止</div>
      <div style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:8px 14px">
        <div id="clock">--:--:--</div>
        <div id="datestr">載入中...</div>
      </div>
    </div>
  </div>
</div>

<div id="main">

  <div id="ay-info">
    📅 目前學年度：<strong id="ay-display">計算中...</strong>
    &nbsp;·&nbsp; 台灣學年度說明：每年 <strong>8月起</strong> 為新學年第1學期，<strong>2月起</strong> 為同學年第2學期。民國年與學年度相差半年，屬正常現象。
  </div>

  <div id="stats"></div>

  <div id="toolbar">
    <div class="sw">
      <span class="si">🔍</span>
      <input id="search" type="text" placeholder="搜尋課程、獎助學金、交換生...">
    </div>
    <select id="ss">
      <option value="deadline">依截止日排序</option>
      <option value="title">依名稱排序</option>
    </select>
    <button id="ab" onclick="fcat('all')">全部</button>
  </div>

  <div id="cards"></div>
  <div id="empty">無符合條件的活動資訊</div>

  <div id="footer">
    學年度自動換算（台灣教育部制）· 資料來源：虎尾科技大學各單位官網<br>
    <span style="color:#333">如有異動請以學校最新公告為準</span>
  </div>
</div>

<script>
// ════════════════════════════════════════
//  學年度自動換算
//  台灣慣例：8月起為新學年第1學期
//  例：2026年3月 → 114學年度第2學期
//      2026年9月 → 115學年度第1學期
// ════════════════════════════════════════
function getAY() {
  const m = new Date().getMonth() + 1;
  const roc = new Date().getFullYear() - 1911;
  return m >= 8 ? roc : roc - 1;
}
function getSEM() {
  const m = new Date().getMonth() + 1;
  return (m >= 2 && m <= 7) ? 2 : 1;
}
const AY = getAY();   // 現在是 114（3月，尚未到8月換學年）
const SEM = getSEM(); // 現在是 2

// 顯示學年度說明
document.getElementById('ay-display').textContent =
  `民國 ${AY} 學年度 第 ${SEM} 學期`;

// ════════════════════════════════════════
//  日期工具
// ════════════════════════════════════════
function daysFromNow(n) {
  const t = new Date();
  t.setDate(t.getDate() + n);
  return t;
}

// ════════════════════════════════════════
//  各單位真實官網連結（已驗證可開啟）
// ════════════════════════════════════════
const LINKS = {
  // 進修推廣部（語言課程、補助）
  cedu:     "https://www.nfu.edu.tw/zh/extensiveed",
  // 教務處（選課、行事曆）
  acad:     "https://nfuaca.nfu.edu.tw/index.php/zh/",
  // 國際事務處（交換生）
  oia:      "https://nfuoia.nfu.edu.tw/",
  // 學務處獎助學金公告
  scholar:  "https://nfuosa.nfu.edu.tw/scholarship-news.html",
  // 學校行政公告
  announce: "https://www.nfu.edu.tw/zh/approved-news-nfu/approved-news-adm",
  // 校務系統（加退選）
  ecare:    "https://ecare.nfu.edu.tw/",
};

// ════════════════════════════════════════
//  分類
// ════════════════════════════════════════
const CATS = [
  { id: "language",    label: "語言進修課程", icon: "語", color: "#00D4AA" },
  { id: "scholarship", label: "獎助學金",     icon: "獎", color: "#FF6B35" },
  { id: "subsidy",     label: "補助申請",     icon: "補", color: "#7B61FF" },
  { id: "exchange",    label: "出國交換生",   icon: "交", color: "#FFD700" },
  { id: "continuing",  label: "進修部公告",   icon: "進", color: "#FF4D8D" },
];

// ════════════════════════════════════════
//  公告資料
//  ★ 標題/說明中的年度用 AY、SEM 自動帶入
//  ★ 截止日用 daysFromNow(N) 每次開啟自動算
//  ★ 連結指向各單位真實公告頁面
//  ★ 需要新增/修改：告訴 Claude 要改什麼即可
// ════════════════════════════════════════
const EVENTS = [
  // ─ 語言課程 ─────────────────────────────
  {
    id: 1, cat: "language",
    title: `英語能力檢定輔導課程（多益TOEIC）`,
    dept: "語言教學中心", div: "日間／夜間",
    desc: `${AY}學年度第${SEM}學期 TOEIC英語能力提升課程，含模擬測驗與師資輔導，提升英語職場競爭力。`,
    deadline: daysFromNow(12), start: daysFromNow(20),
    link: LINKS.cedu, status: "開放報名",
    tags: ["英語", "TOEIC", "能力檢定"],
  },
  {
    id: 2, cat: "language",
    title: `日語檢定（JLPT）課程輔導班`,
    dept: "語言教學中心", div: "日間部",
    desc: `${AY}學年度 N5至N2日語分級課程，由專業師資帶領，適合零基礎至進階學習者。`,
    deadline: daysFromNow(5), start: daysFromNow(15),
    link: LINKS.cedu, status: "即將截止",
    tags: ["日語", "JLPT", "語言"],
  },
  {
    id: 10, cat: "language",
    title: `韓語入門課程（進修部夜間班）`,
    dept: "進修教務組", div: "夜間部",
    desc: `${AY}學年度專為夜間部學生設計的韓語入門課，每週一次共16週，由韓語師資授課。`,
    deadline: daysFromNow(25), start: daysFromNow(32),
    link: LINKS.cedu, status: "開放報名",
    tags: ["韓語", "夜間部", "入門"],
  },
  // ─ 獎助學金 ─────────────────────────────
  {
    id: 3, cat: "scholarship",
    title: `教育部弱勢學生助學計畫（${AY}學年度）`,
    dept: "學生事務處", div: "全體學生",
    desc: `針對經濟弱勢學生提供每學期最高3萬元助學金，需檢附家庭所得證明及在校成績單。`,
    deadline: daysFromNow(30), start: null,
    link: LINKS.scholar, status: "開放申請",
    tags: ["助學金", "教育部", "弱勢"],
  },
  {
    id: 4, cat: "scholarship",
    title: `虎尾科大傑出學生獎學金（${AY}學年度第${SEM}學期）`,
    dept: "進修教務組", div: "進修部",
    desc: `鼓勵進修部優秀學生，學業成績名列前茅者可申請，每名最高獎勵NT$15,000。`,
    deadline: daysFromNow(8), start: null,
    link: LINKS.scholar, status: "即將截止",
    tags: ["獎學金", "傑出", "進修部"],
  },
  // ─ 補助申請 ─────────────────────────────
  {
    id: 5, cat: "subsidy",
    title: `學生出席國際學術研討會補助（${AY}年度）`,
    dept: "研發處", div: "全體學生",
    desc: `學生參與國際研討會發表論文可申請機票、住宿及註冊費補助，每人最高NT$50,000。`,
    deadline: daysFromNow(45), start: null,
    link: LINKS.announce, status: "開放申請",
    tags: ["研討會", "國際", "補助"],
  },
  {
    id: 6, cat: "subsidy",
    title: `語言能力檢定考試費用補助（${AY}學年度）`,
    dept: "進修教務組", div: "進修部",
    desc: `進修部學生參加英、日、德、法等語言國際認證考試，可申請考試費用全額或部分補助。`,
    deadline: daysFromNow(18), start: null,
    link: LINKS.cedu, status: "開放申請",
    tags: ["語言補助", "考試費", "進修部"],
  },
  // ─ 出國交換生 ────────────────────────────
  {
    id: 7, cat: "exchange",
    title: `${AY}學年度第${SEM}學期赴日交換生計畫`,
    dept: "國際事務處(OIA)", div: "日間部",
    desc: `與日本姐妹校合作提供1學期或1學年交換名額，含部分學海飛颺獎學金補助。`,
    deadline: daysFromNow(22), start: daysFromNow(120),
    link: LINKS.oia, status: "開放報名",
    tags: ["日本", "交換生", "學海飛颺"],
  },
  {
    id: 8, cat: "exchange",
    title: `歐洲暑期語言文化交流計畫（${AY}年度）`,
    dept: "國際事務處(OIA)", div: "全體學生",
    desc: `前往德國、法國、西班牙等歐洲大學進行4週語言課程與文化體驗，提供部分補助。`,
    deadline: daysFromNow(35), start: daysFromNow(90),
    link: LINKS.oia, status: "開放報名",
    tags: ["歐洲", "暑期", "語言文化"],
  },
  // ─ 進修部公告 ────────────────────────────
  {
    id: 9, cat: "continuing",
    title: `進修部${AY}學年度第${SEM}學期課程加退選公告`,
    dept: "進修教務組", div: "進修部",
    desc: `進修部夜間學制學生請注意加退選時間，逾期不予受理。請至校務ECARE系統操作網路選課。`,
    deadline: daysFromNow(3), start: null,
    link: LINKS.ecare, status: "緊急公告",
    tags: ["加退選", "課程", "進修部"],
  },
];

// ════════════════════════════════════════
//  狀態樣式
// ════════════════════════════════════════
const SS = {
  "開放報名": { bg: "rgba(0,212,170,.15)",   bd: "#00D4AA", c: "#00D4AA" },
  "開放申請": { bg: "rgba(123,97,255,.15)",  bd: "#7B61FF", c: "#7B61FF" },
  "即將截止": { bg: "rgba(255,107,53,.2)",   bd: "#FF6B35", c: "#FF6B35" },
  "緊急公告": { bg: "rgba(255,77,77,.2)",    bd: "#FF4D4D", c: "#FF4D4D" },
  "已截止":   { bg: "rgba(100,100,100,.15)", bd: "#666",    c: "#888"    },
};

// ════════════════════════════════════════
//  即時時鐘
// ════════════════════════════════════════
function tick() {
  const n = new Date();
  document.getElementById('clock').textContent =
    n.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  document.getElementById('datestr').textContent =
    n.toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' });
  document.querySelectorAll('.countdown[data-dl]').forEach(el => {
    el.innerHTML = cdhtml(+el.dataset.dl, el.dataset.c || '#00D4AA');
  });
  const urgN = EVENTS.filter(e => {
    const d = Math.floor((e.deadline - n) / 86400000);
    return d >= 0 && d < 7;
  }).length;
  document.getElementById('ub').style.display = urgN > 0 ? 'block' : 'none';
  document.getElementById('uc').textContent = urgN;
}

// ════════════════════════════════════════
//  倒數計時 HTML
// ════════════════════════════════════════
function cdhtml(ms, color) {
  const diff = ms - Date.now();
  if (diff <= 0) return '<span class="cx">已截止</span>';
  const days  = Math.floor(diff / 86400000);
  const hours = Math.floor(diff % 86400000 / 3600000);
  const mins  = Math.floor(diff % 3600000 / 60000);
  const secs  = Math.floor(diff % 60000 / 1000);
  const urg = days < 7;
  const bg  = urg ? 'rgba(255,77,77,.15)'  : 'rgba(0,212,170,.12)';
  const bd  = urg ? 'rgba(255,77,77,.4)'   : 'rgba(0,212,170,.3)';
  const col = urg ? '#FF6B6B' : color;
  return [[days,'天'],[hours,'時'],[mins,'分'],[secs,'秒']].map(([v,u]) =>
    `<div class="cu" style="background:${bg};border:1px solid ${bd}">
      <span class="cv" style="color:${col}">${String(v).padStart(2,'0')}</span>
      <span class="cl">${u}</span>
    </div>`
  ).join('');
}

// ════════════════════════════════════════
//  渲染
// ════════════════════════════════════════
let AC = 'all', SB = 'deadline';

function renderStats() {
  const n = Date.now();
  document.getElementById('stats').innerHTML = CATS.map(cat => {
    const cnt = EVENTS.filter(e => e.cat === cat.id).length;
    const urg = EVENTS.filter(e => {
      if (e.cat !== cat.id) return false;
      const d = Math.floor((e.deadline - n) / 86400000);
      return d >= 0 && d < 7;
    }).length;
    const a = AC === cat.id;
    return `<div class="sc" style="${a ? `border-color:${cat.color}55;background:${cat.color}10` : ''}"
      onclick="fcat('${cat.id}')">
      <div style="font-size:24px;font-weight:900;font-family:'Noto Serif TC',serif;color:${cat.color};margin-bottom:4px">${cat.icon}</div>
      <div style="font-size:12px;font-weight:700;color:#ccc;margin-bottom:2px">${cat.label}</div>
      <div style="font-size:11px;color:#666">${cnt}項${urg > 0 ? ` <span style="color:#FF6B35">· ${urg}緊急</span>` : ''}</div>
    </div>`;
  }).join('');
}

function renderCards() {
  const n = Date.now();
  const q = document.getElementById('search').value.toLowerCase();
  const list = EVENTS
    .filter(e => AC === 'all' || e.cat === AC)
    .filter(e => !q || e.title.includes(q) || e.desc.includes(q) || e.tags.some(t => t.includes(q)))
    .sort((a, b) => SB === 'deadline' ? a.deadline - b.deadline : a.title.localeCompare(b.title, 'zh-TW'));

  const container = document.getElementById('cards');
  const empty = document.getElementById('empty');
  if (!list.length) { container.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  container.innerHTML = list.map(e => {
    const cat = CATS.find(c => c.id === e.cat);
    const dl = Math.floor((e.deadline - n) / 86400000);
    const urg = dl >= 0 && dl < 7;
    const s = SS[e.status] || SS['開放申請'];
    const tags = e.tags.map(t =>
      `<span style="font-size:11px;border-radius:20px;padding:2px 10px;color:${cat.color};background:${cat.color}18;border:1px solid ${cat.color}33">#${t}</span>`
    ).join('');
    const startbox = e.start ? `
      <div class="tb">
        <div class="tl">📅 活動開始日</div>
        <div style="font-size:15px;font-weight:700;color:${cat.color};font-family:'Courier Prime',monospace">
          ${e.start.toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric' })}
        </div>
        <div class="td">距今 ${Math.max(0, Math.floor((e.start - n) / 86400000))} 天</div>
      </div>` : '';

    return `<div class="ec${urg ? ' urgent' : ''}" style="border-left:4px solid ${cat.color}">
      ${urg ? '<div class="uf">緊急</div>' : ''}
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap">
        <span class="sbadge" style="background:${s.bg};border:1px solid ${s.bd};color:${s.c}">${e.status}</span>
        <span style="font-size:11px;color:#888;background:rgba(255,255,255,.05);padding:2px 8px;border-radius:10px">${e.div}</span>
        <span style="font-size:11px;color:#666">${e.dept}</span>
      </div>
      <div style="font-size:16px;font-weight:700;color:#F0F0F0;font-family:'Noto Serif TC',serif;line-height:1.4;margin-bottom:8px">${e.title}</div>
      <div style="font-size:13px;color:#999;line-height:1.7;margin-bottom:12px">${e.desc}</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">${tags}</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-bottom:14px">
        <div class="tb">
          <div class="tl">⏰ 報名截止倒數</div>
          <div class="countdown" data-dl="${e.deadline.getTime()}" data-c="${cat.color}">
            ${cdhtml(e.deadline.getTime(), cat.color)}
          </div>
          <div class="td">截止日：${e.deadline.toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric' })}</div>
        </div>
        ${startbox}
      </div>
      <a href="${e.link}" target="_blank"
        style="display:inline-flex;align-items:center;background:transparent;border:1px solid rgba(255,255,255,.15);color:#aaa;border-radius:10px;padding:8px 18px;font-size:13px;font-weight:600;text-decoration:none;font-family:'Noto Sans TC',sans-serif;transition:all .2s"
        onmouseover="this.style.background='rgba(255,255,255,.05)';this.style.color='#ddd'"
        onmouseout="this.style.background='transparent';this.style.color='#aaa'">
        前往官網公告 →
      </a>
    </div>`;
  }).join('');
}

function fcat(id) {
  AC = id;
  const btn = document.getElementById('ab');
  btn.style.cssText = id === 'all'
    ? 'background:rgba(0,212,170,.15);border:1px solid rgba(0,212,170,.55);color:#00D4AA;border-radius:12px;padding:10px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:Noto Sans TC,sans-serif'
    : 'background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);color:#888;border-radius:12px;padding:10px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:Noto Sans TC,sans-serif';
  renderStats();
  renderCards();
}

// ════════════════════════════════════════
//  初始化
// ════════════════════════════════════════
document.getElementById('search').addEventListener('input', renderCards);
document.getElementById('ss').addEventListener('change', e => { SB = e.target.value; renderCards(); });

fcat('all');
tick();
setInterval(tick, 1000);
</script>
</body>
</html>
